<div class="login-wrapper">

  <div class="login-card">

    <div class="login-header text-center mb-4">
      <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
        <span class="logo-pill">RF</span>
        <span class="logo-text">ReadFlow</span>
      </div>
      <h2 class="login-title">Crear cuenta</h2>
      <p class="text-muted-rf">Únete a ReadFlow hoy</p>
    </div>

    <div class="alert alert-danger d-flex align-items-center gap-2 mb-3" *ngIf="error">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ error }}</span>
    </div>

    <div class="alert alert-success d-flex align-items-center gap-2 mb-3" *ngIf="exito">
      <i class="bi bi-check-circle-fill"></i>
      <span>{{ exito }}</span>
    </div>

    <div class="mb-3">
      <label class="form-label-rf">Nombre completo</label>
      <div class="input-group-rf">
        <i class="bi bi-person"></i>
        <input type="text" class="input-rf" placeholder="Tu nombre" [(ngModel)]="nombre" />
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label-rf">Correo electrónico</label>
      <div class="input-group-rf">
        <i class="bi bi-envelope"></i>
        <input type="email" class="input-rf" placeholder="correo@ejemplo.com" [(ngModel)]="email" />
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label-rf">Contraseña</label>
      <div class="input-group-rf">
        <i class="bi bi-lock"></i>
        <input type="password" class="input-rf" placeholder="Mínimo 6 caracteres" [(ngModel)]="password" />
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label-rf">Confirmar contraseña</label>
      <div class="input-group-rf">
        <i class="bi bi-lock-fill"></i>
        <input type="password" class="input-rf" placeholder="Repite tu contraseña" [(ngModel)]="confirmar" />
      </div>
    </div>

    <button class="btn-login w-100" (click)="registrar()" [disabled]="cargando">
      <span *ngIf="!cargando">Crear cuenta</span>
      <span *ngIf="cargando">
        <span class="spinner-border spinner-border-sm me-2"></span>Cargando...
      </span>
    </button>

    <p class="text-center mt-3 text-muted-rf" style="font-size: 12px;">
      ¿Ya tienes cuenta?
      <a routerLink="/login" style="color:#a78bfa; text-decoration:none; font-weight:600;">Inicia sesión</a>
    </p>

  </div>

</div>
